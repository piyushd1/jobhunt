# Job Hunt Agent — Configuration
# Copy .env.example to .env and fill in your API keys

llm:
  # ── Model format: "provider/model-name" (litellm convention) ──
  # Groq:       groq/llama-3.1-8b-instant, groq/llama-3.3-70b-versatile
  # OpenRouter: openrouter/google/gemini-2.0-flash, openrouter/meta-llama/llama-3.1-70b-instruct
  # OpenAI:     gpt-4o-mini, gpt-4o
  # Anthropic:  claude-3-haiku-20240307, claude-3-5-sonnet-20241022
  # Google:     gemini/gemini-1.5-flash

  # Default model — used when an agent doesn't specify its own
  default_model: "openrouter/qwen/qwen3.6-plus:free"
  # Fallback model — used when primary hits rate limits after all retries
  fallback_model: "openrouter/google/gemini-2.0-flash-exp:free"
  temperature: 0.3
  max_retries: 3                     # Retries per model before switching to fallback
  backoff_base_s: 5                  # Base delay for exponential backoff (5s, 15s, 45s)
  delay_between_calls_s: 3          # Pause between consecutive LLM calls to avoid rate limits

  # Per-agent model overrides — experiment freely, leave blank to use default
  agents:
    resume_profiler: ""            # One-time, can use a capable model
    parsing: ""                    # Needs good structured extraction
    matching: ""                   # Core scoring — benefits from stronger model
    leadgen: ""                    # Light usage
    messaging: ""                  # Drafting — tone matters, try different models

  # Embedding model for resume RAG (ChromaDB)
  # Options:
  #   local: uses sentence-transformers (free, runs on CPU, no API needed)
  #   openai: uses text-embedding-3-small via OpenAI API
  #   groq: not supported yet
  embedding:
    provider: "local"              # "local" or "openai"
    model: "all-MiniLM-L6-v2"     # For local: sentence-transformers model name
    # model: "text-embedding-3-small"  # For openai

browser:
  profile_dir: "./data/browser_profile"
  headless: false                 # Visible browser = lower detection risk
  slow_mo: 800                   # ms between browser actions
  timeout: 30000                 # ms page load timeout

search:
  keywords:
    - "Product Manager"
    - "Senior Product Manager"
    - "Group Product Manager"
    - "Project Manager"
    - "Program Manager"
    - "Product Owner"
  location: "India"
  remote_ok: true
  experience_years: 5
  max_results_per_portal: 25

portals:
  linkedin:
    enabled: true
    base_url: "https://www.linkedin.com/jobs/search/"
  naukri:
    enabled: true
    base_url: "https://www.naukri.com"
  foundit:
    enabled: true
    base_url: "https://www.foundit.in"
  indeed:
    enabled: false               # Phase 2
    base_url: "https://www.indeed.co.in"
  instahyre:
    enabled: false               # Phase 2
    base_url: "https://www.instahyre.com/candidate/opportunities/"
  hirist:
    enabled: false               # Phase 2
    base_url: "https://www.hirist.tech"
  wellfound:
    enabled: false               # Phase 2
    base_url: "https://wellfound.com/jobs"
  whatsapp:
    enabled: false               # Phase 2
    group_names:
      - "PM Job's"
      - "HireWire Job Alerts"
      - "Protocol Jobs"
      - "Daily PM Jobs"
    scan_hours: 24

matching:
  shortlist_threshold: 70        # Lead gen only for scores >= this
  max_shortlist_per_day: 20
  weights:
    skills: 0.60
    experience: 0.25
    location: 0.15
  mandatory_skill_cap: 65        # Max score if >= 2 mandatory skills missing

lead_gen:
  contacts_per_job: 3
  search_roles:
    - "Recruiter"
    - "Talent Acquisition"
    - "Engineering Manager"
    - "HR"
  delay_between_searches_s: [5, 8]  # Random range

resume:
  path: "./data/resume.pdf"
  profile_cache: "./data/candidate_profile.json"

output:
  db_path: "./data/job_hunt.db"

blacklist:
  companies: []
  title_keywords: ["intern", "fresher", "unpaid"]
  min_experience_years: 0
