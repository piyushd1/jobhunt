# Job Hunt Agent — Configuration
# Copy .env.example to .env and fill in your API keys

llm:
  # ── Model format: "provider/model-name" (litellm convention) ──
  #
  # Thinking models (complex reasoning):
  #   openrouter/deepseek/deepseek-r1              ~$0.55/M tokens
  #   openrouter/qwen/qwen3-235b-a22b              ~$0.30/M tokens
  #   openrouter/deepseek/deepseek-chat-v3-0324    ~$0.27/M tokens (DeepSeek V3.2)
  #
  # Mid-tier (good quality, affordable):
  #   openrouter/qwen/qwen3.6-plus:free            Free but rate-limited
  #   openrouter/anthropic/claude-3.5-haiku         ~$0.80/M in, $4/M out
  #
  # Speed models (fast + cheap, for bulk work):
  #   groq/llama-3.3-70b-versatile                 Free tier, blazing fast via Groq LPU
  #   groq/llama-3.1-8b-instant                    Free tier, fastest
  #   openrouter/free                               Auto-routes to a working free model

  # ── Global defaults ──
  default_model: "openrouter/qwen/qwen3.6-plus:free"
  fallback_model: "openrouter/free"
  temperature: 0.3
  max_retries: 3
  backoff_base_s: 5
  delay_between_calls_s: 2          # Pause between consecutive LLM calls

  # ── Per-agent model selection ──
  # All OpenRouter — add Groq models when you have the API key.
  agents:
    resume_profiler:
      model: "openrouter/deepseek/deepseek-chat-v3-0324"   # Strong reasoning, runs once
      fallback: "openrouter/qwen/qwen3.6-plus:free"
    parsing:
      model: "openrouter/qwen/qwen3.6-plus:free"           # Structured extraction, 40+ calls
      fallback: "openrouter/free"
    matching:
      model: "openrouter/deepseek/deepseek-chat-v3-0324"   # Best reasoning for scoring
      fallback: "openrouter/qwen/qwen3.6-plus:free"
    leadgen:
      model: "openrouter/qwen/qwen3.6-plus:free"
      fallback: "openrouter/free"
    messaging:
      model: "openrouter/qwen/qwen3.6-plus:free"           # Good writing quality
      fallback: "openrouter/free"

  # Embedding model for resume RAG (ChromaDB)
  embedding:
    provider: "local"              # "local" = free, no API needed
    model: "all-MiniLM-L6-v2"     # 384-dim, runs on CPU

browser:
  profile_dir: "./data/browser_profile"
  headless: false                 # Visible browser = lower detection risk
  slow_mo: 800                   # ms between browser actions
  timeout: 30000                 # ms page load timeout

search:
  keywords:
    - "Product Manager"
    - "Senior Product Manager"
    - "Group Product Manager"
    - "Project Manager"
    - "Program Manager"
    - "Product Owner"
  locations:                         # Searched in order of preference
    - "Bangalore"
    - "Hyderabad"
    - "Gurugram"
  remote_ok: true
  experience_years: 5
  max_results_per_portal: 25

portals:
  linkedin:
    enabled: true
    base_url: "https://www.linkedin.com/jobs/search/"
  naukri:
    enabled: true
    base_url: "https://www.naukri.com"
  foundit:
    enabled: true
    base_url: "https://www.foundit.in"
  indeed:
    enabled: false               # Phase 2
    base_url: "https://www.indeed.co.in"
  instahyre:
    enabled: false               # Phase 2
    base_url: "https://www.instahyre.com/candidate/opportunities/"
  hirist:
    enabled: false               # Phase 2
    base_url: "https://www.hirist.tech"
  wellfound:
    enabled: false               # Phase 2
    base_url: "https://wellfound.com/jobs"
  whatsapp:
    enabled: false               # Phase 2
    group_names:
      - "PM Job's"
      - "HireWire Job Alerts"
      - "Protocol Jobs"
      - "Daily PM Jobs"
    scan_hours: 24

matching:
  shortlist_threshold: 70        # Lead gen only for scores >= this
  max_shortlist_per_day: 20
  weights:
    skills: 0.60
    experience: 0.25
    location: 0.15
  mandatory_skill_cap: 65        # Max score if >= 2 mandatory skills missing

lead_gen:
  contacts_per_job: 3
  search_roles:
    - "Recruiter"
    - "Talent Acquisition"
    - "Engineering Manager"
    - "HR"
  delay_between_searches_s: [5, 8]  # Random range

resume:
  path: "./data/resume.pdf"
  profile_cache: "./data/candidate_profile.json"

output:
  db_path: "./data/job_hunt.db"

blacklist:
  companies: []
  title_keywords: ["intern", "fresher", "unpaid"]
  min_experience_years: 0
