search:
  # ── KEYWORDS — APM/PM only ──
  # Project/Program Manager intentionally excluded from search keywords:
  # they're allowed only at big-brand companies, gated post-sourcing.
  keywords:
    - "Associate Product Manager"
    - "APM"
    - "Product Manager"
    - "Junior Product Manager"

  # Role priority tiers — matching agent boosts score for higher-priority fits
  role_priority:
    tier1:  # Best fit
      - "associate product manager"
      - "apm"
      - "product manager"
    tier2:  # Good fit
      - "junior product manager"
      - "growth product manager"
      - "growth pm"
      - "associate pm"
    tier3:  # Open to (empty — no Product Analyst per user request)
      - "consumer pm"

  # Precision-first role scope — only PM core. Project/Program Manager handled
  # by the big-brand company gate in sourcing (see big_brand_companies above).
  allowed_role_families:
    - "pm_core"

  excluded_title_keywords:
    # Too senior
    - "senior"
    - "sr."
    - "sr "
    - "lead"
    - "principal"
    - "staff"
    - "head of"
    - "director"
    - "vp"
    - "chief"
    - "group product manager"
    - "gpm"
    # Wrong family per user's instruction
    - "product analyst"
    - "business analyst"
    - "data analyst"
    - "scrum master"
    - "growth manager"
    - "growth marketing"
    - "sales"
    - "intern"
    - "fresher"
    - "trainee"
    - "product owner"

  locations:
    - "Bangalore"
  remote_ok: true

  # HARD experience filter — no buffer
  experience_min: 0
  experience_max: 3
  experience_buffer: 0

  max_results_per_portal: 75
  pages_per_search: 3
  max_age_days: 15

portals:
  linkedin:
    enabled: true
    base_url: "https://www.linkedin.com/jobs/search/"
  linkedin_posts:
    enabled: true
    base_url: "https://www.linkedin.com/search/results/content/"
  naukri:
    enabled: true
    base_url: "https://www.naukri.com"
  foundit:
    enabled: true
    base_url: "https://www.foundit.in"
  indeed:
    enabled: true
    base_url: "https://www.indeed.co.in"
  instahyre:
    enabled: true
    base_url: "https://www.instahyre.com/candidate/opportunities/"
  hirist:
    enabled: true
    base_url: "https://www.hirist.tech"
  wellfound:
    enabled: true
    base_url: "https://wellfound.com/jobs"
  whatsapp:
    enabled: false
    group_names:
      - "PM Job's"
      - "HireWire Job Alerts"
      - "Protocol Jobs"
      - "Daily PM Jobs"
    scan_hours: 24

matching:
  precision_mode: "high_precision"
  shortlist_threshold: 65        # Lower than 70 — fewer perfect matches at APM level
  sheet_min_score: 45            # Lower threshold to capture borderline good companies
  max_shortlist_per_day: 20
  weights:
    required_skills: 0.25
    preferred_skills: 0.10
    experience: 0.15
    location: 0.10
    domain: 0.25
    role_fit: 0.15
  mandatory_skill_cap: 55

