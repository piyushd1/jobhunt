# Job Hunt Agent — Generic Configuration Template
#
# This file holds STRUCTURAL defaults shared by every user (portals, model
# settings, scoring weights, pipeline settings).
#
# Candidate-specific values (search keywords, locations, experience range,
# resume_signals, disqualifiers, domain_preferences, big_brand_companies,
# excluded_title_keywords, role_priority) are written to config.local.yaml
# by `python -m src init`.
#
# config.local.yaml is gitignored; it overrides anything in this file.
# See config.local.yaml.example for the full set of overridable keys.
#
# Copy .env.example to .env and fill in your API keys before running anything.

llm:
  # ── Model format: "provider/model-name" (litellm convention) ──
  #
  # Thinking models (complex reasoning):
  #   openrouter/deepseek/deepseek-r1
  #   openrouter/qwen/qwen3-235b-a22b
  #   openrouter/deepseek/deepseek-v3.2
  #
  # Mid-tier (good quality, affordable):
  #   openrouter/qwen/qwen3.6-plus
  #   openrouter/anthropic/claude-3.5-haiku
  #
  # Speed models (fast + cheap, for bulk work):
  #   groq/llama-3.3-70b-versatile        Free tier, fast via Groq LPU
  #   groq/llama-3.1-8b-instant           Free tier, fastest
  #   openrouter/free                     Auto-routes to a working free model

  # ── Global defaults ──
  default_model: "openrouter/qwen/qwen3.6-plus"
  fallback_model: "openrouter/free"
  temperature: 0.3
  max_retries: 3
  backoff_base_s: 5
  delay_between_calls_s: 2

  # ── Per-agent model selection ──
  agents:
    resume_profiler:
      model: "openrouter/deepseek/deepseek-v3.2"
      fallback: "openrouter/xiaomi/mimo-v2-pro"
    config_deriver:
      model: "openrouter/deepseek/deepseek-v3.2"
      fallback: "openrouter/qwen/qwen3.6-plus"
    parsing:
      model: "openrouter/xiaomi/mimo-v2-pro"
      fallback: "minimax/minimax-m2.7"
    matching:
      model: "openrouter/deepseek/deepseek-v3.2"
      fallback: "openrouter/xiaomi/mimo-v2-pro"
    leadgen:
      model: "openrouter/xiaomi/mimo-v2-pro"
      fallback: "minimax/minimax-m2.7"
    messaging:
      model: "openrouter/xiaomi/mimo-v2-pro"
      fallback: "minimax/minimax-m2.7"

  # Embedding model for resume RAG (ChromaDB)
  embedding:
    provider: "local"
    model: "all-MiniLM-L6-v2"

browser:
  profile_dir: "./data/browser_profile"
  headless: false
  slow_mo: 800
  timeout: 30000

# ── BIG-BRAND COMPANIES ──
# Controls which companies allow Project/Program Manager titles
# (gated post-sourcing). Override in config.local.yaml.
# An empty list means: filter out ALL Project/Program Manager titles.
big_brand_companies: []

search:
  # Candidate-specific values are written to config.local.yaml by `init`.
  # See config.local.yaml.example for keys: keywords, locations,
  # experience_min, experience_max, role_priority, excluded_title_keywords.

  # Sane defaults (overridden by config.local.yaml when init runs):
  keywords:
    - "Product Manager"
  locations:
    - "Bangalore"
  remote_ok: true
  experience_min: 0
  experience_max: 99
  experience_buffer: 0
  max_results_per_portal: 75
  pages_per_search: 3
  max_age_days: 15

  # Default precision-first scope. Override in config.local.yaml if needed.
  allowed_role_families:
    - "pm_core"

  # Generic fallback exclusions — config.local.yaml typically extends this.
  excluded_title_keywords:
    - "intern"
    - "fresher"
    - "trainee"

  # Default tier1 = same as keywords. Init wizard rewrites these per-candidate.
  role_priority:
    tier1: []
    tier2: []
    tier3: []

portals:
  linkedin:
    enabled: true
    base_url: "https://www.linkedin.com/jobs/search/"
  linkedin_posts:
    enabled: true
    base_url: "https://www.linkedin.com/search/results/content/"
  naukri:
    enabled: true
    base_url: "https://www.naukri.com"
  foundit:
    enabled: true
    base_url: "https://www.foundit.in"
  indeed:
    enabled: true
    base_url: "https://www.indeed.co.in"
  instahyre:
    enabled: true
    base_url: "https://www.instahyre.com/candidate/opportunities/"
  hirist:
    enabled: true
    base_url: "https://www.hirist.tech"
  wellfound:
    enabled: true
    base_url: "https://wellfound.com/jobs"
  whatsapp:
    enabled: false
    group_names: []
    scan_hours: 24

matching:
  precision_mode: "high_precision"
  shortlist_threshold: 65
  sheet_min_score: 45
  max_shortlist_per_day: 20
  weights:
    required_skills: 0.25
    preferred_skills: 0.10
    experience: 0.15
    location: 0.10
    domain: 0.25
    role_fit: 0.15
  mandatory_skill_cap: 55

  # Candidate-specific blocks below are typically written to config.local.yaml.
  # The lists here are intentionally empty so that init's overlay completely
  # replaces them on first run. Without an init pass, matching falls back to
  # neutral domain scoring (no resume_signals to boost, no disqualifiers to penalize).
  resume_signals: []
  disqualifiers: []
  domain_preferences:
    strong_fit: []
    moderate_fit: []
    weak_fit: []

  # Supplementary context file (PM stories for richer matching, optional)
  stories_file: "./data/stories.md"

lead_gen:
  contacts_per_job: 3
  search_roles:
    - "Recruiter"
    - "Talent Acquisition"
    - "HR"
  delay_between_searches_s: [5, 8]

resume:
  path: "./data/resume.pdf"
  profile_cache: "./data/candidate_profile.json"

output:
  db_path: "./data/job_hunt.db"

blacklist:
  companies: []
  title_keywords: ["intern", "fresher", "unpaid", "trainee"]
  min_experience_years: 0
