# Job Hunt Agent — Configuration
# Copy .env.example to .env and fill in your API keys

llm:
  # ── Model format: "provider/model-name" (litellm convention) ──
  #
  # Thinking models (complex reasoning):
  #   openrouter/deepseek/deepseek-r1              ~$0.55/M tokens
  #   openrouter/qwen/qwen3-235b-a22b              ~$0.30/M tokens
  #   openrouter/deepseek/deepseek-chat-v3-0324    ~$0.27/M tokens (DeepSeek V3.2)
  #
  # Mid-tier (good quality, affordable):
  #   openrouter/qwen/qwen3.6-plus            Free but rate-limited
  #   openrouter/anthropic/claude-3.5-haiku         ~$0.80/M in, $4/M out
  #
  # Speed models (fast + cheap, for bulk work):
  #   groq/llama-3.3-70b-versatile                 Free tier, blazing fast via Groq LPU
  #   groq/llama-3.1-8b-instant                    Free tier, fastest
  #   openrouter/free                               Auto-routes to a working free model

  # ── Global defaults ──
  default_model: "openrouter/qwen/qwen3.6-plus"
  fallback_model: "openrouter/free"
  temperature: 0.3
  max_retries: 3
  backoff_base_s: 5
  delay_between_calls_s: 2          # Pause between consecutive LLM calls

  # ── Per-agent model selection ──
  # All OpenRouter — add Groq models when you have the API key.
  agents:
    resume_profiler:
      model: "openrouter/deepseek/deepseek-v3.2"   # Strong reasoning, runs once
      fallback: "openrouter/xiaomi/mimo-v2-pro"
    parsing:
      model: "openrouter/xiaomi/mimo-v2-pro"           # Structured extraction, 40+ calls
      fallback: "minimax/minimax-m2.7"
    matching:
      model: "openrouter/deepseek/deepseek-v3.2"   # Best reasoning for scoring
      fallback: "openrouter/xiaomi/mimo-v2-pro"
    leadgen:
      model: "openrouter/xiaomi/mimo-v2-pro"
      fallback: "minimax/minimax-m2.7"
    messaging:
      model: "openrouter/xiaomi/mimo-v2-pro"           # Good writing quality
      fallback: "minimax/minimax-m2.7"

  # Embedding model for resume RAG (ChromaDB)
  embedding:
    provider: "local"              # "local" = free, no API needed
    model: "all-MiniLM-L6-v2"     # 384-dim, runs on CPU

browser:
  profile_dir: "./data/browser_profile"
  headless: false                 # Visible browser = lower detection risk
  slow_mo: 800                   # ms between browser actions
  timeout: 30000                 # ms page load timeout

search:
  # Keywords searched per portal, grouped by priority.
  # Higher priority roles get a scoring boost in matching.
  keywords:
    # Priority 1: Product Management (core target)
    - "Product Manager"
    - "Senior Product Manager"
    - "Group Product Manager"
    - "Product Owner"
    # Priority 2: Program/Project Management at tech companies
    - "Program Manager"
    - "Project Manager"
    - "Technical Program Manager"
    # Priority 3: Business/growth roles at startups
    - "Growth Product Manager"
    - "Business Operations Manager"

  # Role priority tiers — matching agent boosts score for higher-priority fits
  role_priority:
    tier1:  # Best fit
      - "product manager"
      - "senior product manager"
      - "group product manager"
      - "product lead"
      - "head of product"
      - "product owner"
    tier2:  # Good fit
      - "program manager"
      - "project manager"
      - "technical program manager"
      - "senior program manager"
    tier3:  # Open to
      - "growth manager"
      - "business operations"
      - "growth product manager"
      - "chief of staff"
      - "strategy manager"
      - "general manager"

  locations:                         # Searched in order of preference
    - "Bangalore"
    - "Hyderabad"
    - "Gurugram"
  remote_ok: true
  experience_min: 7                  # Minimum years you're targeting
  experience_max: 13                 # Maximum years you're targeting
  experience_buffer: 2               # Accept jobs ±2 years outside range (5-7 and 13-15 qualify)
  max_results_per_portal: 75         # Increased for 3 pages
  pages_per_search: 3                # How many pages to scrape per keyword+location combo
  max_age_days: 15                   # Only source jobs posted within this many days

portals:
  linkedin:
    enabled: true
    base_url: "https://www.linkedin.com/jobs/search/"
  naukri:
    enabled: true
    base_url: "https://www.naukri.com"
  foundit:
    enabled: true
    base_url: "https://www.foundit.in"
  indeed:
    enabled: true
    base_url: "https://www.indeed.co.in"
  instahyre:
    enabled: true
    base_url: "https://www.instahyre.com/candidate/opportunities/"
  hirist:
    enabled: true
    base_url: "https://www.hirist.tech"
  wellfound:
    enabled: true
    base_url: "https://wellfound.com/jobs"
  whatsapp:
    enabled: false               # Phase 2
    group_names:
      - "PM Job's"
      - "HireWire Job Alerts"
      - "Protocol Jobs"
      - "Daily PM Jobs"
    scan_hours: 24

matching:
  shortlist_threshold: 70        # Lead gen only for scores >= this
  sheet_min_score: 50            # Only jobs >= this appear in Google Sheet (targets 20-40 jobs)
  max_shortlist_per_day: 20
  weights:
    skills: 0.35
    experience: 0.15
    location: 0.15
    domain: 0.35                 # Domain + work-pattern fit is THE differentiator
  mandatory_skill_cap: 55

  # ── RESUME MATCH SIGNALS ──
  # Phrases from YOUR actual resume/work. When found in a JD, they indicate
  # the job needs the type of work you've actually done. Scored as positive signals.
  resume_signals:
    # Marketplace dynamics (your core for 12 years)
    - "marketplace"
    - "two-sided"
    - "two sided"
    - "supply and demand"
    - "supply side"
    - "demand side"
    - "vendor management"
    - "partner management"
    - "seller"
    - "matchmaking"
    - "booking"
    - "order management"

    # Consumer/mobile product
    - "consumer"
    - "mobile app"
    - "app product"
    - "dau"
    - "mau"
    - "user acquisition"
    - "user engagement"
    - "retention"
    - "churn"
    - "nps"

    # Growth & monetization (your strengths)
    - "growth"
    - "p&l"
    - "pnl"
    - "unit economics"
    - "pricing"
    - "monetization"
    - "revenue"
    - "gtm"
    - "go-to-market"
    - "0 to 1"
    - "zero to one"
    - "0-to-1"

    # Platform & architecture (your JD work)
    - "platform"
    - "api"
    - "self-serve"
    - "self serve"
    - "scalab"

    # AI/ML (your recent differentiator)
    - "ai product"
    - "llm"
    - "genai"
    - "machine learning"
    - "search"

    # Local services / on-demand (your domain)
    - "local"
    - "hyperlocal"
    - "on-demand"
    - "on demand"
    - "home services"
    - "gig"
    - "e-commerce"
    - "ecommerce"

  # ── DISQUALIFYING SIGNALS ──
  # Phrases that indicate the role needs deep domain expertise you DON'T have.
  # If 2+ disqualifiers appear and 0 resume signals, the job is a bad fit.
  disqualifiers:
    - "enterprise sales experience"
    - "saas sales"
    - "b2b saas experience"
    - "enterprise customer"
    - "large account"
    - "core banking"
    - "banking domain"
    - "lending platform"
    - "loan"
    - "underwriting"
    - "insurance product"
    - "claims management"
    - "regulatory compliance"
    - "soc 2"
    - "hipaa"
    - "pci dss"
    - "developer tools"
    - "developer experience"
    - "sdk"
    - "embedded system"
    - "firmware"
    - "semiconductor"
    - "chip design"
    - "telecom"
    - "networking protocol"
    - "hardware product"
    - "manufacturing"
    - "supply chain management"
    - "procurement"
    - "erp implementation"
    - "crm platform"
    - "salesforce"
    - "wealth management"
    - "asset management"

  # ── DOMAIN CATEGORIES ──
  # Broader company-level domain signals (secondary to resume/disqualifier signals)
  domain_preferences:
    strong_fit:
      - "marketplace"
      - "consumer"
      - "b2c"
      - "e-commerce"
      - "ecommerce"
      - "platform"
      - "local services"
      - "home services"
      - "hyperlocal"
      - "on-demand"
      - "gig economy"
      - "classifieds"
      - "aggregator"
      - "digital media"
      - "content platform"
      - "social"
      - "entertainment"
      - "mobile"
      - "app"
    moderate_fit:
      - "fintech"
      - "payments"
      - "neobank"
      - "edtech"
      - "food delivery"
      - "quick commerce"
      - "travel"
      - "mobility"
      - "logistics"
      - "real estate"
      - "proptech"
      - "healthtech"
      - "gaming"
      - "adtech"
      - "advertising"
      - "startup"
      - "ai"
      - "machine learning"
      - "genai"
    weak_fit:
      - "b2b saas"
      - "enterprise software"
      - "erp"
      - "crm"
      - "cybersecurity"
      - "devtools"
      - "developer tools"
      - "cloud infrastructure"
      - "consulting"
      - "manufacturing"
      - "semiconductor"
      - "telecom"
      - "insurance"
      - "core banking"
      - "embedded"
      - "firmware"
      - "hardware"
      - "iot"

  # Supplementary context file (your PM stories for richer matching)
  stories_file: "./data/stories.md"

lead_gen:
  contacts_per_job: 3
  search_roles:
    - "Recruiter"
    - "Talent Acquisition"
    - "Engineering Manager"
    - "HR"
  delay_between_searches_s: [5, 8]  # Random range

resume:
  path: "./data/resume.pdf"
  profile_cache: "./data/candidate_profile.json"

output:
  db_path: "./data/job_hunt.db"

blacklist:
  companies: []
  title_keywords: ["intern", "fresher", "unpaid"]
  min_experience_years: 0
